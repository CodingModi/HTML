<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>table tag</title>
</head>
<body>

            </tr>
            <tr>
                <td>hindi</td>

                <td>100</td>
            </tr>
            <tr>
                <td>english</td>
                <td>87</td>
                <td>100</td>
            </tr>
            <tr>
                <td>math</td>
                <td>82</td>
                <td>100</td>
            </tr><tr>
                <td>science</td>
                <td>86</td>
                <td>100</td>
            </tr><tr>
                <td>social science</td>
                <td>87</td>
                <td>100</td>
            </tr>
        </tbody>
        <tfoot>
            <tr>
                <td colspan="2">percentage</td>
                <td>88.60%</td>
            </tr>
        </tfoot>
    </table>
</body>
</html>
